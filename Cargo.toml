[package]
name = "ice-dashboard"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0.94"
chrono = { version = "0.4.39", features = ["serde"] }
dotenv = "0.15.0"
iced = { version = "0.13.1", features = ["image", "advanced", "canvas"] }
postgrest = "1.6.0"
serde = { version = "1.0.216", features = ["derive"] }
serde_json = "1.0.133"
uuid = { version = "1.11.0", features = ["serde", "v4"] }
